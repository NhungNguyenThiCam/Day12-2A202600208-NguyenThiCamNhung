version: "3.9"

services:
  # ──────────────────────────────────────
  # Agent Service
  # ──────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - APP_VERSION=1.0.0
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=10
      - MONTHLY_BUDGET_USD=10.0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period=15s
    restart: unless-stopped
    networks:
      - internal

  # ──────────────────────────────────────
  # Redis — Session cache & Rate limiting
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

# ──────────────────────────────────────
# Volumes — Persistent data
# ──────────────────────────────────────
volumes:
  redis_data:

# ──────────────────────────────────────
# Network — Internal communication
# ──────────────────────────────────────
networks:
  internal:
    driver: bridge
